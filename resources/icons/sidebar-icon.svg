<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <style>
    .antigravity-icon {
      fill: currentColor;
    }
    .accent {
      fill: currentColor;
      opacity: 0.5;
    }
    .ring {
      stroke: currentColor;
      stroke-width: 1.5;
      fill: none;
      opacity: 0.3;
    }
    .core {
      fill: currentColor;
    }
  </style>
  
  <!-- Outer Ring (Atmosphere) -->
  <circle class="ring" cx="12" cy="12" r="10" stroke-dasharray="2 2" />
  
  <!-- Main Orb Body -->
  <path class="antigravity-icon" d="M12 4c-4.42 0-8 3.58-8 8s3.58 8 8 8 8-3.58 8-8-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6s2.69-6 6-6 6 2.69 6 6-2.69 6-6 6z" />
  
  <!-- Inner Dynamic Core (Antigravity essence) -->
  <path class="accent" d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zm0 8c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3z" />
  
  <!-- Gravity Displacement (The "11" style element) -->
  <path class="core" d="M11 10h2v4h-2z" />
  <path class="core" d="M12 9c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zM12 13c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1z" />
  
  <!-- Decorative Orbit -->
  <circle class="antigravity-icon" cx="12" cy="12" r="1.5">
    <animate attributeName="r" values="1.5;2;1.5" dur="3s" repeatCount="indefinite" />
  </circle>
  
  <!-- Side gravity lines -->
  <path class="accent" d="M3 12h2M19 12h2M12 3v2M12 19v2" stroke="currentColor" stroke-width="1" stroke-linecap="round" />
</svg>